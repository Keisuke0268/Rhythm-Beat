<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RhythmBeat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id=<div id="menu">
  <h2>RhythmBeat</h2>

  <select id="songSelect">
    <option>Bright Sky</option>
    <option>Night Drive</option>
    <option>Future Beat</option>
  </select>

  <select id="difficulty">
    <option>Easy Lv.5</option>
    <option>Normal Lv.11</option>
    <option>Hard Lv.18</option>
    <option>Expert Lv.25</option>
    <option>Master Lv.31</option>
  </select>

  <button id="start">START</button>
    </div>"game">
        <div class="lane" data-lane="0"></div>
        <div class="lane" data-lane="1"></div>
        <div class="lane" data-lane="2"></div>
        <div class="lane" data-lane="3"></div>
    </div>

    <div id="hud">
        <p>Score: <span id="score">0</span></p>
        <p>Combo: <span id="combo">0</span></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
